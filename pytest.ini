[pytest]
testpaths = harness
markers =
    phase0: Environment
    phase1: VCA unit tests
    phase2: Toy data generation
    phase3: Paper documentation
    phase4: Failure documentation
    phase5: Inference + GIF debug
    phase6: Training loop
    phase7: Softmax vs Sigmoid ablation
    phase8: Sigma-Mask IoU evaluation
    phase9: L_ortho ablation (z-collapse)
    phase10: Learning validity (encoding fix + sigma_consistency)
    phase11: Real AnimateDiff VCA integration (requires GPU + model download)
    slow: Tests requiring GPU or model download (excluded from default run)
addopts = --tb=short -v -m "not slow"
