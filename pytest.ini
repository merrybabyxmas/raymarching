[pytest]
testpaths = harness
markers =
    phase0: Environment
    phase1: VCA unit tests
    phase2: Toy data generation
    phase3: Paper documentation
    phase4: Failure documentation
    phase5: Inference + GIF debug
    phase6: Training loop
    phase7: Softmax vs Sigmoid ablation
    phase8: Sigma-Mask IoU evaluation
    phase9: L_ortho ablation (z-collapse)
    phase10: Learning validity (encoding fix + sigma_consistency)
    phase11: Real AnimateDiff VCA integration (requires GPU + model download)
    phase12: AnimateDiff VCA fine-tuning (requires GPU + model download)
    phase13: Paper figure generation (requires GPU + trained checkpoint)
    phase14: t_max x lambda_depth experiments + 8-prompt comparison (requires GPU)
    phase15: Objaverse 3D asset dataset generation (requires internet + GPU)
    phase16: Objaverse retraining + Phase12 vs Phase16 comparison (requires GPU)
    phase17: λ 재조정 재학습 — 생성 품질 보존 + Depth 감독 균형 (requires GPU)
    phase18: λ_depth 그리드 탐색 0.1/0.2/0.3 (requires GPU)
    phase19: 학습 근본 원인 4가지 수정 (per-frame loss, fixed probe, depth_pe scale, multi-layer) (requires GPU)
    phase20: Fix1+2+3 단독 (mid_block 단일 주입 복원, Fix4 제거) (requires GPU)
    phase21: 구조적 버그 수정 (additive VCA) + depth_rank_accuracy 측정 (requires GPU)
    phase22: VCA 주입 up_blocks.2(16×16) + text_attn 고해상도 캡처 (requires GPU)
    phase23: Color-qualified 프롬프트 + Direct z-order loss (requires GPU)
    phase24: Depth-focused: lambda_depth=5.0 + lambda_diff=0.05 + ratio fix (requires GPU)
    phase25: Text attn supervision: TrainableAttnProcessor + l_attn_mask_loss (requires GPU)
    phase26: Text attn stronger supervision: lambda_attn=30.0 + clip=0.5 + full lr (requires GPU)
    slow: Tests requiring GPU or model download (excluded from default run)
addopts = --tb=short -v -m "not slow"
