# Phase 64 Scaled — Stage 4: SDXL Transfer
run_name: p64s_stage4_sdxl

model:
  depth_bins: 16
  hidden_dim: 128
  id_dim: 256
  pose_dim: 64
  spatial_h: 64
  spatial_w: 64
  slot_dim: 256
  ctx_dim: 128
  # sdxl adapter
  guide_max_ratio: 0.1
  inject_blocks: ["up0", "up1", "up2"]

training:
  epochs: 40
  steps_per_epoch: 100
  eval_every: 10
  lr_adapter: 1.0e-4
  grad_clip: 1.0
  t_max: 500
  n_frames: 1
  height: 256
  width:  256
  seed: 42
  lambda_diff: 1.0
  lambda_surv: 2.0

out_dir: checkpoints/p64s_stage4_sdxl
stage1_ckpt: checkpoints/p64s_stage1/best_scene_prior.pt

data:
  data_root: toy/data_objaverse_full
  val_frac: 0.15

backbone:
  pipeline: stabilityai/sdxl-turbo
