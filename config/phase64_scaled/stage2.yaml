# Phase 64 Scaled — Stage 2: Structured Decoder
run_name: p64s_stage2

model:
  depth_bins: 16
  hidden_dim: 128
  id_dim: 256
  pose_dim: 64
  spatial_h: 64
  spatial_w: 64
  slot_dim: 256
  ctx_dim: 128
  decoder_upsample_to: 256

training:
  epochs: 80
  steps_per_epoch: 100
  eval_every: 10
  lr_decoder: 2.0e-4
  lr_encoder: 0.0
  grad_clip: 1.0
  n_frames: 1
  height: 256
  width:  256
  seed: 42
  lambda_recon: 1.0
  lambda_iso:   0.5

stage1_ckpt: checkpoints/phase64_scaled/p64s_stage1/best_scene_prior.pt

eval:
  visible_survival_thresh: 0.02

data:
  data_root: toy/data_objaverse_full
  val_frac: 0.15
