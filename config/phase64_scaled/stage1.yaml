# Phase 64 Scaled — Stage 1: Backbone-Agnostic Scene Prior
# Scale-up vs toy: hidden 64→128, spatial 32→64, depth_bins 8→16, id_dim 128→256
run_name: p64s_stage1

model:
  depth_bins: 16
  hidden_dim: 128
  id_dim: 256
  pose_dim: 64
  spatial_h: 64
  spatial_w: 64
  slot_dim: 256
  ctx_dim: 128

training:
  epochs: 200
  steps_per_epoch: 100
  eval_every: 10
  lr_field:   5.0e-4
  lr_encoder: 2.0e-4
  lr_memory:  1.0e-4
  grad_clip: 0.5
  n_frames: 1
  height: 256
  width:  256
  seed: 42
  # Loss weights (same as toy)
  lambda_vis:   2.0
  lambda_amo:   1.0
  lambda_occ:   0.5
  lambda_surv: 10.0
  lambda_color: 3.0
  lambda_sep:   0.2
  lambda_id:    0.0
  lambda_temp:  0.0

eval:
  visible_survival_thresh: 0.02
  min_survival: 0.03

data:
  data_root: toy/data_objaverse_full
  val_frac: 0.15
  n_frames: 1
  volume_gt_render_resolution: 128
