# Experiment: Sweep lambda_sep values
# Test different separation loss weights

device: cuda

data:
  root: data/phase65
  image_size: 256
  mask_size: 64
  num_frames: 16
  split_json: outputs/phase65/splits/ablation_all_seed42.json
  split_name: train

model:
  slot_dim: 256
  feat_dim: 64
  hidden_dim: 128
  Hs: 64
  Ws: 64
  Hf: 32
  Wf: 32

train:
  epochs: 30
  batch_size: 4
  lr: 3e-4
  seed: 42
  lambda_vis: 1.0
  lambda_amo: 1.0
  lambda_occ: 0.25
  lambda_temp: 0.25
  lambda_depth: 0.0
  lambda_sep: 0.3  # Will be overridden by sweep script
  grad_clip: 1.0
  use_camera_cond: true

ablation:
  use_camera_cond: true

# Sweep values: [0.0, 0.1, 0.3, 0.5, 1.0]

eval:
  every_n_epochs: 10
  batch_size: 4
