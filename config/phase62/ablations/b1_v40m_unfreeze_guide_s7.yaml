# B1 v40m: unfreeze guide in stage3 (2026-04-16)
#
# ROOT CAUSE OF ALL v40 FAILURES: freeze_guide_stage3=true locks oscillating balance.
#
# Mechanism confirmed from v40l gate analysis:
#   gate=0.10 → balance=0.847-0.985 ✓ (balanced while guide frozen at warm_start)
#   gate=0.45 (final stage2): balance=0.485 ✗ (SHARP DROP — low oscillation phase)
#   stage3 entry: freeze_guide=true LOCKS the guide at this low-balance state
#   adapter_lr_scale=0.1 → lambda_balance too weak to recover via entity_probs alone
#   Result: balance stays 0.38-0.54 throughout stage3 → C_guide perpetually fails
#
# v39h DID NOT have freeze_guide_stage3. Its guide kept training → lambda_balance
# could CORRECT any imbalance in stage3. winner=0.53-0.56 → PASSED C_guide.
#
# FIX: Remove freeze_guide_stage3 (set to false).
#   - Guide assembler remains trainable in stage3
#   - lambda_balance=3.0 can push guide to produce balanced cross-attention
#   - adapter_lr_scale_stage3=0.1 still reduces entity_probs oscillation
#     (it was never about guide — it's about LoRA/backbone stability)
#
# This config keeps ALL v40l improvements:
#   - guide_family: dual (symmetric injection)
#   - spatial_h: 32 + feat_dim: 320 + backbone_primary_idx: 2
#   - la_feature_sep: 3.0 + use_entity_sep_mask: true → cosF → 0.000
#   - la_diff: 2.5 → diff_mse ≤ 0.056 ✓
#   - lambda_compact: 5.0 → LCC ≥ 0.45 (alternating, needs robust check)
#   - adapter_lr_scale_stage3: 0.1
#   - CDIFF_MSE_MAX: 0.056 (recalibrated)
#
# ONE CHANGE: freeze_guide_stage3: false (was true in v40l/j/k/i)
#
# GPU: 0, Seed: 7

objective: factorized_fg_id
schedule: S3
representation: factorized_fg_id
guide_family: dual                     # symmetric 2-stream injection
depth_bins: 8
hidden_dim: 64
spatial_h: 32
spatial_w: 32
feat_dim: 320                          # up_blocks.3 (spatial_h=32 requires this)
backbone_primary_idx: 2
n_classes: 3
inject_config: multiscale
update_schedule: hybrid
freeze_vol_stage3: true
freeze_fg_spatial_stage3: true
freeze_guide_stage3: false             # KEY: allow guide to self-correct balance in stage3
stage1_epochs_override: 100
vol_stage2_lr_factor: 0.01
adapter_lr_scale_stage3: 0.1          # still reduces entity_probs oscillation

scene_type: col
gate_warm_start: 0.10

training:
  epochs: 260                          # 13 stage3 evals for C_robust
  steps_per_epoch: 20
  eval_every: 5
  lr_volume: 5e-4
  lr_guide: 6e-4
  lr_lora: 5e-5
  lr_adapter: 5e-5
  la_diff: 2.5
  la_vol: 3.0
  lambda_id: 10.0
  fg_pos_weight: 10.0
  lambda_vis: 0.5
  t_max: 300
  n_frames: 8
  height: 256
  width: 256
  seed: 7
  la_feature_sep: 3.0                  # balanced entity features (cosF → 0.000)
  use_entity_sep_mask: true            # focus sep gradient on entity pixels
  scene_type: col
  temp_start: 1.0
  temp_end: 0.3
  diff_warmup_epochs: 5
  lambda_compact: 5.0                  # LCC ≥ 0.45 threshold
  lambda_depth_ce: 3.0
  lambda_depth_vis: 2.0
  compact_warmup_epoch: 0
  balance_warmup_epoch: 100
  lambda_gate_push: 1.5
  min_gate_stage3: 0.10
  max_gate: 0.45
  lambda_balance: 3.0
  lambda_iso: 1.0

  lambda_spatial_coherence: 0.3
  lambda_fg_prior: 1.0
  min_fg_fraction: 0.05
  lambda_perm_consist: 0.2
  lambda_amodal_coverage: 0.5
  min_amodal_coverage: 0.02

eval:
  n_steps: 20
  guidance_scale: 7.5
  eval_seed: 42

data:
  data_root: toy/data_objaverse
  val_frac: 0.2
  volume_gt_render_resolution: 128

model:
  adapter_rank: 64
  lora_rank: 4
  pipeline: emilianJR/epiCRealism
  motion_adapter: guoyww/animatediff-motion-adapter-v1-5-3

lambda_overlay_preserve_s3: 5.0
