# B1 v35: lambda_overlay_preserve_s3=2.0 — rendered fg-coverage preservation in stage3
#
# ROOT CAUSE OF OVERLAY DROP IN STAGE3 (DEFINITIVE, 2026-04-15):
#
# Stage3: LoRA/adapters train → UNet features drift → vol/fg_spatial frozen params
# receive DIFFERENT inputs → entity_probs change → p_fg_k = entity_probs.sum(dim=1)
# changes → visible_class (front_probs threshold check) changes → overlay drops.
#
# This affects BOTH frozen and unfrozen fg_spatial:
#   - Frozen (v28-v32): no gradient update possible, entity_probs drift with UNet features
#   - Unfrozen (v33): L_vis pulls fg_magnitude in entity-specific directions during stage3,
#     preventing recovery toward GT fg coverage
#
# THE FIX (v35): Add L_overlay_preserve = Dice(front_probs[:, 1:].sum(), GT_fg_any)
#   - Activates ONLY in stage3 (trainer sets lambda_overlay_preserve_s3 at stage3 entry)
#   - Directly supervises rendered fg probability → GT fg union
#   - Gradient path: L_overlay_preserve → front_probs (straight-through) → entity_probs
#     → p_fg → fg_magnitude → fg_spatial_head (unfrozen in stage3)
#   - fg_spatial adapts in stage3 to maintain fg coverage regardless of UNet feature drift
#   - Entity balance maintained by established q from stage2 (lambda_id=10 trained well)
#
# WHY NOT ACTIVE IN STAGE1/2:
#   - Stage1/2: entity 1 needs to form; activating this loss might reinforce entity 0
#     dominance (entity 0 would be pushed to cover full fg union)
#   - Entity balance forms through L_id + L_balance + L_vis in stage1/2 (same as v33)
#   - Only activate in stage3 when entity balance is already established
#
# Previous failures:
#   v28-v29 (lambda_id=10, frozen fg): overlay collapsed 0.34→0.22 in stage3
#   v30 (lambda_id=3, frozen fg): entity collapse (winner=0.73)
#   v31 (lambda_id=5, frozen fg): entity collapse (winner=0.66)
#   v32 (lambda_id=7, frozen fg): overlay=0.357 at ep129 but dropped to 0.23 in stage3
#   v33 (lambda_id=10, unfrozen fg): overlay declined 0.313→0.224 in stage3
#   v34 (detach ALL p_fg): entity collapse + depth_attn over-concentration
#
# v35 combines:
#   - lambda_id=10: entity balance (winner=0.51-0.58) from stage1/2
#   - freeze_fg_spatial_stage3=False: fg_spatial can adapt in stage3
#   - freeze_vol_stage3=True: compact protected
#   - lambda_overlay_preserve_s3=2.0: explicit fg coverage maintenance in stage3
#
# Expected:
#   compact: 0.40-0.43 (vol frozen, compact stable) ✓
#   winner: 0.51-0.58 (lambda_id=10, entity balance from stage2) ✓
#   overlay: 0.35+ (fg_spatial adapts via L_overlay_preserve to maintain GT fg coverage) ✓
#   diff_mse: ≤0.050 by ep200-210 (same diffusion training as v33) ✓

objective: factorized_fg_id
schedule: S3
representation: factorized_fg_id
guide_family: dual

depth_bins: 8
hidden_dim: 64
spatial_h: 16
spatial_w: 16
n_classes: 3
inject_config: mid_up2
update_schedule: hybrid
freeze_vol_stage3: true
freeze_fg_spatial_stage3: false   # unfrozen: adapts via L_overlay_preserve in stage3
stage1_epochs_override: 100
vol_stage2_lr_factor: 0.01

training:
  epochs: 220
  steps_per_epoch: 20
  eval_every: 5
  lr_volume: 5e-4
  lr_guide: 6e-4
  lr_lora: 5e-5
  lr_adapter: 5e-5
  la_diff: 1.0
  la_vol: 3.0
  lambda_id: 10.0             # entity balance (winner~0.51-0.58)
  fg_pos_weight: 10.0
  lambda_vis: 0.5
  t_max: 300
  n_frames: 8
  height: 256
  width: 256
  seed: 7
  la_feature_sep: 0.0
  temp_start: 1.0
  temp_end: 0.3
  diff_warmup_epochs: 5
  lambda_compact: 3.0
  lambda_depth_ce: 3.0
  lambda_depth_vis: 2.0
  compact_warmup_epoch: 0
  balance_warmup_epoch: 100
  lambda_gate_push: 0.0
  min_gate_stage3: 0.10
  max_gate: 0.35
  lambda_balance: 3.0

eval:
  n_steps: 20
  guidance_scale: 7.5
  eval_seed: 42

data:
  data_root: toy/data_objaverse
  val_frac: 0.2
  volume_gt_render_resolution: 128

model:
  adapter_rank: 64
  lora_rank: 4
  pipeline: emilianJR/epiCRealism
  motion_adapter: guoyww/animatediff-motion-adapter-v1-5-3

# v35 KEY: overlay-preserving loss activates at stage3 entry (ep165)
lambda_overlay_preserve_s3: 2.0
