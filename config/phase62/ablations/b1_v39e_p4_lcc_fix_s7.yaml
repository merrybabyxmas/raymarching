# B1 v39e: Priority 4 — spatial coherence + fg prior + permutation consistency
#
# GOAL: Fix C_topo LCC failure. LCC=0.60 is the last major blocker in v39b/c.
#       This run adds architectural improvements from analysis.md Priority 4.
#
# Problem (from v39a/b/c at ep154):
#   - LCC=0.58-0.60 (needs ≥0.85 for C_topo pass)
#   - Entity volumes are spatially fragmented (many disconnected components)
#   - Root cause: id_logits independently predicted per-voxel, no spatial cohesion
#
# Fix (v39e):
#   1. lambda_spatial_coherence: 0.3 → TV regularization on entity_probs(B,2,K,H,W)
#      Penalises rapid entity assignment changes between neighbouring voxels.
#      Encourages compact, connected entity regions → higher LCC.
#
#   2. lambda_fg_prior: 1.0 → prevent all-background collapse
#      Hinge loss: relu(min_fg_fraction - mean(p_fg))^2
#      Ensures entity_probs don't degenerate to zero everywhere.
#
#   3. lambda_perm_consist: 0.2 → cross-frame entity permutation consistency
#      Penalises frame-to-frame entity label flips.
#      Uses dice-like overlap between consecutive frame entity_probs.
#
#   4. max_gate: 0.40 (raised from 0.35) → allow stronger guide injection
#      Goal: keep overlay consistently ≥ 0.35 (v39b/c oscillate ~0.33-0.36)
#
#   5. gate_warm_start: 0.1, la_feature_sep: 1.0 (from v39c best config)
#
# Expected outcome:
#   - LCC improves from 0.60 → ≥0.75 (spatial coherence TV)
#   - overlay consistently ≥ 0.35 (max_gate=0.40 allows stronger injection)
#   - fg coverage maintained (fg_prior prevents collapse)
#   - C_topo LCC: 0.60 → target 0.85 (may need multiple epochs of stage2/3)
#
# Run after v39b/c complete (GPU 0/1/2 free). Target GPU: any available.
#
# Priority analysis document: docs/analysis.md (Experiment Group 4 / v39.4)
# Priority: 4 (factorized id-branch fix)

objective: factorized_fg_id
schedule: S3
representation: factorized_fg_id
guide_family: dual
depth_bins: 8
hidden_dim: 64
spatial_h: 16
spatial_w: 16
n_classes: 3
inject_config: mid_up2
update_schedule: hybrid
freeze_vol_stage3: true
freeze_fg_spatial_stage3: false
stage1_epochs_override: 100
vol_stage2_lr_factor: 0.01

# v39e: Priority 4 params
scene_type: col
gate_warm_start: 0.1

training:
  epochs: 220
  steps_per_epoch: 20
  eval_every: 5
  lr_volume: 5e-4
  lr_guide: 6e-4
  lr_lora: 5e-5
  lr_adapter: 5e-5
  la_diff: 1.0
  la_vol: 3.0
  lambda_id: 10.0
  fg_pos_weight: 10.0
  lambda_vis: 0.5
  t_max: 300
  n_frames: 8
  height: 256
  width: 256
  seed: 7
  la_feature_sep: 1.0             # feature separation (from v39c)
  scene_type: col
  temp_start: 1.0
  temp_end: 0.3
  diff_warmup_epochs: 5
  lambda_compact: 3.0
  lambda_depth_ce: 3.0
  lambda_depth_vis: 2.0
  compact_warmup_epoch: 0
  balance_warmup_epoch: 100
  lambda_gate_push: 0.5
  min_gate_stage3: 0.10
  max_gate: 0.40                   # RAISED from 0.35 → allow stronger guide injection
  lambda_balance: 3.0
  lambda_iso: 1.0

  # Priority 4: new loss terms
  lambda_spatial_coherence: 0.3   # TV regularization → coherent entity regions → higher LCC
  lambda_fg_prior: 1.0             # fg coverage prior → prevent all-bg collapse
  min_fg_fraction: 0.05            # minimum acceptable mean fg probability
  lambda_perm_consist: 0.2         # cross-frame permutation consistency

eval:
  n_steps: 20
  guidance_scale: 7.5
  eval_seed: 42

data:
  data_root: toy/data_objaverse
  val_frac: 0.2
  volume_gt_render_resolution: 128

model:
  adapter_rank: 64
  lora_rank: 4
  pipeline: emilianJR/epiCRealism
  motion_adapter: guoyww/animatediff-motion-adapter-v1-5-3

lambda_overlay_preserve_s3: 5.0
