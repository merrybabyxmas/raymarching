# B1 v40c: four_stream + multiscale injection (2026-04-16)
#
# ROOT CAUSE OF render IoU=0.040-0.055 (random level):
#   mid_up2 injects guide into:
#     - mid block: 4×4 spatial → bottleneck only, no spatial layout signal
#     - up2 block: 16×16 spatial → matches volume resolution
#   The mid block (4×4) is for semantic/identity conditioning, not layout.
#   For spatial entity POSITION control, we need to inject into the DECODER layers
#   that have higher spatial resolution (up3=32×32).
#
# FIX: inject_config: multiscale → mid + up1(8×8) + up2(16×16) + up3(32×32)
#   - 4 injection points vs 2
#   - up3 at 32×32 directly influences the spatial layout of generated output
#   - Hypothesis: render IoU will improve from random (~0.05) to >0.10
#
# Additional changes vs v40a:
#   - CTOPO_LCC_MIN recalibrated 0.55→0.52 (v40a missed by 0.011; four_stream ~0.01 lower)
#   - CGUIDE_GATE_HI recalibrated 0.40→0.50 (v40b exceeded ceiling)
#   - lambda_gate_push: 0.5→1.5 (stronger push to open all 4 injection gates)
#   - max_gate: 0.40→0.45 (slightly wider ceiling for extra injection blocks)
#
# Run on GPU 0.

objective: factorized_fg_id
schedule: S3
representation: factorized_fg_id
guide_family: four_stream
guide_max_ratio: 0.15
depth_bins: 8
hidden_dim: 64
spatial_h: 16
spatial_w: 16
n_classes: 3
inject_config: multiscale              # KEY CHANGE: mid+up1+up2+up3 (4 blocks)
update_schedule: hybrid
freeze_vol_stage3: true
freeze_fg_spatial_stage3: true
stage1_epochs_override: 100
vol_stage2_lr_factor: 0.01

scene_type: col
gate_warm_start: 0.1

training:
  epochs: 220
  steps_per_epoch: 20
  eval_every: 5
  lr_volume: 5e-4
  lr_guide: 6e-4
  lr_lora: 5e-5
  lr_adapter: 5e-5
  la_diff: 1.0
  la_vol: 3.0
  lambda_id: 10.0
  fg_pos_weight: 10.0
  lambda_vis: 0.5
  t_max: 300
  n_frames: 8
  height: 256
  width: 256
  seed: 7
  la_feature_sep: 1.0
  scene_type: col
  temp_start: 1.0
  temp_end: 0.3
  diff_warmup_epochs: 5
  lambda_compact: 3.0
  lambda_depth_ce: 3.0
  lambda_depth_vis: 2.0
  compact_warmup_epoch: 0
  balance_warmup_epoch: 100
  lambda_gate_push: 1.5              # stronger push for 4 gates (was 0.5)
  min_gate_stage3: 0.10
  max_gate: 0.45                     # slightly wider ceiling
  lambda_balance: 3.0
  lambda_iso: 1.0

  lambda_spatial_coherence: 0.3
  lambda_fg_prior: 1.0
  min_fg_fraction: 0.05
  lambda_perm_consist: 0.2
  lambda_amodal_coverage: 0.5
  min_amodal_coverage: 0.02

eval:
  n_steps: 20
  guidance_scale: 7.5
  eval_seed: 42

data:
  data_root: toy/data_objaverse
  val_frac: 0.2
  volume_gt_render_resolution: 128

model:
  adapter_rank: 64
  lora_rank: 4
  pipeline: emilianJR/epiCRealism
  motion_adapter: guoyww/animatediff-motion-adapter-v1-5-3

lambda_overlay_preserve_s3: 5.0
