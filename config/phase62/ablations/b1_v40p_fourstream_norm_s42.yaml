# B1 v40p seed=42: four_stream guide + freeze_guide_stage3=false + per-stream L2 norm (2026-04-15)
#
# Per-stream normalization patch (models/phase62/conditioning.py) prevents entity-0 scale
# dominance that caused positive-feedback collapse in four_stream:
#   OLD: front_e0 = vis_e0 * h_e0   (if vis_e0 >> vis_e1: front_e0 >> front_e1)
#   NEW: front_e0 = _norm_stream(vis_e0 * h_e0)   (unit norm, equal entity contribution)
#
# Combined with freeze_guide_stage3=false (from v40m) which allows lambda_balance to
# correct guide injection imbalance in stage3.
#
# Hypothesis: four_stream provides richer identity cues (back streams) than dual.
# With normalization, it should match or exceed dual guide C_robust rate across seeds.
#
# GPU: 0, Seed: 42

objective: factorized_fg_id
schedule: S3
representation: factorized_fg_id
guide_family: four_stream
depth_bins: 8
hidden_dim: 64
spatial_h: 32
spatial_w: 32
feat_dim: 320
backbone_primary_idx: 2
n_classes: 3
inject_config: multiscale
update_schedule: hybrid
freeze_vol_stage3: true
freeze_fg_spatial_stage3: true
freeze_guide_stage3: false
stage1_epochs_override: 100
vol_stage2_lr_factor: 0.01
adapter_lr_scale_stage3: 0.1

scene_type: col
gate_warm_start: 0.10

training:
  epochs: 260
  steps_per_epoch: 20
  eval_every: 5
  lr_volume: 5e-4
  lr_guide: 6e-4
  lr_lora: 5e-5
  lr_adapter: 5e-5
  la_diff: 2.5
  la_vol: 3.0
  lambda_id: 10.0
  fg_pos_weight: 10.0
  lambda_vis: 0.5
  t_max: 300
  n_frames: 8
  height: 256
  width: 256
  seed: 42
  la_feature_sep: 3.0
  use_entity_sep_mask: true
  scene_type: col
  temp_start: 1.0
  temp_end: 0.3
  diff_warmup_epochs: 5
  lambda_compact: 5.0
  lambda_depth_ce: 3.0
  lambda_depth_vis: 2.0
  compact_warmup_epoch: 0
  balance_warmup_epoch: 0
  lambda_gate_push: 1.5
  min_gate_stage3: 0.10
  max_gate: 0.45
  lambda_balance: 3.0
  lambda_iso: 1.0

  lambda_spatial_coherence: 0.3
  lambda_fg_prior: 1.0
  min_fg_fraction: 0.05
  lambda_perm_consist: 0.2
  lambda_amodal_coverage: 0.5
  min_amodal_coverage: 0.02

eval:
  n_steps: 20
  guidance_scale: 7.5
  eval_seed: 42

data:
  data_root: toy/data_objaverse
  val_frac: 0.2
  volume_gt_render_resolution: 128

model:
  adapter_rank: 64
  lora_rank: 4
  pipeline: emilianJR/epiCRealism
  motion_adapter: guoyww/animatediff-motion-adapter-v1-5-3

lambda_overlay_preserve_s3: 5.0
