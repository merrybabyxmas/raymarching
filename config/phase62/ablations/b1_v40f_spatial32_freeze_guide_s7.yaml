# B1 v40f: four_stream + spatial_h=32 + freeze_guide_stage3 (2026-04-16)
#
# v40e variant with higher la_diff to help diff_mse converge faster.
# AND freeze_guide_stage3 already validated as the overlay fix.
#
# v40c/d both plateau at diff_mse≈0.050 (threshold=0.050) indefinitely.
# Root cause: with stage3 LoRA + adapters training, diff warmup is over
#   but la_diff=1.0 is competing with vol_loss (la_vol=3.0).
#   Boosting la_diff: 1.0→2.0 should push the diffusion branch harder.
#
# Differences from v40e:
#   la_diff: 1.0 → 2.0        # push diff_mse below 0.05 threshold
#   backbone_primary_idx: 2   # same (up_blocks.3, 320-dim, 32×32)
#   spatial_h/w: 32           # same
#   freeze_guide_stage3: true # same (fix overlay drift)
#
# Run on GPU 3.

objective: factorized_fg_id
schedule: S3
representation: factorized_fg_id
guide_family: four_stream
guide_max_ratio: 0.20
feat_dim: 320
backbone_primary_idx: 2
depth_bins: 8
hidden_dim: 64
spatial_h: 32
spatial_w: 32
n_classes: 3
inject_config: multiscale
update_schedule: hybrid
freeze_vol_stage3: true
freeze_fg_spatial_stage3: true
freeze_guide_stage3: true
stage1_epochs_override: 100
vol_stage2_lr_factor: 0.01

scene_type: col
gate_warm_start: 0.10

training:
  epochs: 220
  steps_per_epoch: 20
  eval_every: 5
  lr_volume: 5e-4
  lr_guide: 6e-4
  lr_lora: 5e-5
  lr_adapter: 5e-5
  la_diff: 2.0                         # KEY CHANGE: 2× stronger diff push (was 1.0)
  la_vol: 3.0
  lambda_id: 10.0
  fg_pos_weight: 10.0
  lambda_vis: 0.5
  t_max: 300
  n_frames: 8
  height: 256
  width: 256
  seed: 7
  la_feature_sep: 1.0
  scene_type: col
  temp_start: 1.0
  temp_end: 0.3
  diff_warmup_epochs: 5
  lambda_compact: 3.0
  lambda_depth_ce: 3.0
  lambda_depth_vis: 2.0
  compact_warmup_epoch: 0
  balance_warmup_epoch: 100
  lambda_gate_push: 1.5
  min_gate_stage3: 0.10
  max_gate: 0.45
  lambda_balance: 3.0
  lambda_iso: 1.0

  lambda_spatial_coherence: 0.3
  lambda_fg_prior: 1.0
  min_fg_fraction: 0.05
  lambda_perm_consist: 0.2
  lambda_amodal_coverage: 0.5
  min_amodal_coverage: 0.02

eval:
  n_steps: 20
  guidance_scale: 7.5
  eval_seed: 42

data:
  data_root: toy/data_objaverse
  val_frac: 0.2
  volume_gt_render_resolution: 128

model:
  adapter_rank: 64
  lora_rank: 4
  pipeline: emilianJR/epiCRealism
  motion_adapter: guoyww/animatediff-motion-adapter-v1-5-3

lambda_overlay_preserve_s3: 5.0
