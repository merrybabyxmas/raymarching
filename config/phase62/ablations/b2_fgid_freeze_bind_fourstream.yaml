# B2: factorized_fg_id + S3 (3-phase joint) + four_stream guide
# four_stream: [V_0*F_0, V_1*F_1, (A_0-V_0)*F_0, (A_1-V_1)*F_1]
objective: factorized_fg_id
schedule: S3
representation: factorized_fg_id
guide_family: four_stream

depth_bins: 8
hidden_dim: 64
spatial_h: 16
spatial_w: 16
n_classes: 3
inject_config: mid_up2
update_schedule: hybrid

training:
  epochs: 60
  steps_per_epoch: 20
  eval_every: 5
  lr_volume: 5e-4
  lr_guide: 3e-4
  lr_lora: 5e-5
  lr_adapter: 1e-4
  la_diff: 1.0
  la_vol: 2.0
  lambda_id: 1.0
  fg_pos_weight: 20.0
  lambda_vis: 0.0
  t_max: 300
  n_frames: 8
  height: 256
  width: 256
  seed: 42
  la_feature_sep: 0.0
  temp_start: 1.0
  temp_end: 0.3
  diff_warmup_epochs: 5

eval:
  n_steps: 20
  guidance_scale: 7.5
  eval_seed: 42

data:
  data_root: toy/data_objaverse
  val_frac: 0.2
  volume_gt_render_resolution: 128

model:
  adapter_rank: 64
  lora_rank: 4
  pipeline: emilianJR/epiCRealism
  motion_adapter: guoyww/animatediff-motion-adapter-v1-5-3
