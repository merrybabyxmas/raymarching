# B1 v40b: four_stream + stronger guide (guide_max_ratio=0.3) + temporal centroid
#
# EXTENDS v40a with:
#   1. guide_max_ratio: 0.15 → 0.30 — allows 2× stronger spatial control
#      Rationale: render IoU=0.055=random proves guide is too weak to influence
#      spatial layout. Increasing max_ratio means UNet gets stronger positional
#      signal from guide injection. May produce artifacts → v40a is safer baseline.
#
#   2. lambda_temporal_centroid: 0.1 — centroid-based slot consistency
#      Enforces entity centroids don't swap assignments between adjacent frames.
#      More robust than volumetric permutation during contact frames.
#      Uses loss_temporal_centroid_consistency (added to losses.py 2026-04-15).
#
#   3. max_gate: 0.40 → 0.50 — allows guide gates to open wider
#      With stronger max_ratio, gate ceiling can be raised without over-injection.
#
# Run on GPU 1 (parallel with v40a on GPU 0).
# Compare v40a vs v40b to isolate guide strength effect.

objective: factorized_fg_id
schedule: S3
representation: factorized_fg_id
guide_family: four_stream
guide_max_ratio: 0.30               # 3× stronger than default (0.10) — spatial control
depth_bins: 8
hidden_dim: 64
spatial_h: 16
spatial_w: 16
n_classes: 3
inject_config: mid_up2
update_schedule: hybrid
freeze_vol_stage3: true
freeze_fg_spatial_stage3: true
stage1_epochs_override: 100
vol_stage2_lr_factor: 0.01

scene_type: col
gate_warm_start: 0.1

training:
  epochs: 220
  steps_per_epoch: 20
  eval_every: 5
  lr_volume: 5e-4
  lr_guide: 6e-4
  lr_lora: 5e-5
  lr_adapter: 5e-5
  la_diff: 1.0
  la_vol: 3.0
  lambda_id: 10.0
  fg_pos_weight: 10.0
  lambda_vis: 0.5
  t_max: 300
  n_frames: 8
  height: 256
  width: 256
  seed: 7
  la_feature_sep: 1.0
  scene_type: col
  temp_start: 1.0
  temp_end: 0.3
  diff_warmup_epochs: 5
  lambda_compact: 3.0
  lambda_depth_ce: 3.0
  lambda_depth_vis: 2.0
  compact_warmup_epoch: 0
  balance_warmup_epoch: 100
  lambda_gate_push: 0.5
  min_gate_stage3: 0.10
  max_gate: 0.50                     # wider gate ceiling (was 0.40)
  lambda_balance: 3.0
  lambda_iso: 1.0

  # Priority 4 losses (same as v39h/v40a)
  lambda_spatial_coherence: 0.3
  lambda_fg_prior: 1.0
  min_fg_fraction: 0.05
  lambda_perm_consist: 0.2

  # NEW: Amodal coverage (same as v40a)
  lambda_amodal_coverage: 0.5
  min_amodal_coverage: 0.02

  # NEW: Temporal centroid consistency (centroid-based slot loss)
  lambda_temporal_centroid: 0.1

eval:
  n_steps: 20
  guidance_scale: 7.5
  eval_seed: 42

data:
  data_root: toy/data_objaverse
  val_frac: 0.2
  volume_gt_render_resolution: 128

model:
  adapter_rank: 64
  lora_rank: 4
  pipeline: emilianJR/epiCRealism
  motion_adapter: guoyww/animatediff-motion-adapter-v1-5-3

lambda_overlay_preserve_s3: 5.0
