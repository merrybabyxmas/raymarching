# B1 v39f: Priority 4 — stronger spatial coherence (lambda=1.5)
#
# GOAL: Fix LCC decline observed in v39e stage1.
#
# Problem (from v39e ep9-89):
#   - LCC starts high (0.877 at ep9) but steadily declines to 0.663 by ep89
#   - Root cause: as entity probs concentrate into smaller blobs (2color 0.59→0.11),
#     satellite fragments become proportionally larger → LCC falls
#   - TV λ=0.3 maintains connectivity within blobs but can't prevent
#     fragmentation as entity regions shrink
#
# Fix (v39f):
#   - lambda_spatial_coherence: 0.3 → 1.5  (5× increase)
#     Stronger TV penalises spatial roughness more aggressively,
#     forcing entity regions to maintain connectivity even as they compact.
#
# Everything else identical to v39e.
# Run on GPU 1 (free).

objective: factorized_fg_id
schedule: S3
representation: factorized_fg_id
guide_family: dual
depth_bins: 8
hidden_dim: 64
spatial_h: 16
spatial_w: 16
n_classes: 3
inject_config: mid_up2
update_schedule: hybrid
freeze_vol_stage3: true
freeze_fg_spatial_stage3: false
stage1_epochs_override: 100
vol_stage2_lr_factor: 0.01

scene_type: col
gate_warm_start: 0.1

training:
  epochs: 220
  steps_per_epoch: 20
  eval_every: 5
  lr_volume: 5e-4
  lr_guide: 6e-4
  lr_lora: 5e-5
  lr_adapter: 5e-5
  la_diff: 1.0
  la_vol: 3.0
  lambda_id: 10.0
  fg_pos_weight: 10.0
  lambda_vis: 0.5
  t_max: 300
  n_frames: 8
  height: 256
  width: 256
  seed: 7
  la_feature_sep: 1.0
  scene_type: col
  temp_start: 1.0
  temp_end: 0.3
  diff_warmup_epochs: 5
  lambda_compact: 3.0
  lambda_depth_ce: 3.0
  lambda_depth_vis: 2.0
  compact_warmup_epoch: 0
  balance_warmup_epoch: 100
  lambda_gate_push: 0.5
  min_gate_stage3: 0.10
  max_gate: 0.40
  lambda_balance: 3.0
  lambda_iso: 1.0

  # Priority 4: spatial coherence INCREASED (v39f: 0.3 → 1.5)
  lambda_spatial_coherence: 1.5   # stronger TV → maintain LCC through late stage1
  lambda_fg_prior: 1.0
  min_fg_fraction: 0.05
  lambda_perm_consist: 0.2

eval:
  n_steps: 20
  guidance_scale: 7.5
  eval_seed: 42

data:
  data_root: toy/data_objaverse
  val_frac: 0.2
  volume_gt_render_resolution: 128

model:
  adapter_rank: 64
  lora_rank: 4
  pipeline: emilianJR/epiCRealism
  motion_adapter: guoyww/animatediff-motion-adapter-v1-5-3

lambda_overlay_preserve_s3: 5.0
