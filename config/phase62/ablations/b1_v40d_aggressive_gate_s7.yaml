# B1 v40d: four_stream + aggressive gate push (2026-04-16)
#
# HYPOTHESIS: render IoU is stuck at random because the guide gate is too small.
#   Current effective guide amplitude = max_ratio × gate × hs_std
#   = 0.15 × 0.40 × hs_std = 0.06 × hs_std   (only 6% of UNet feature amplitude)
#
#   For spatial layout control, we likely need guide amplitude ~20-30% of hs_std.
#   This experiment tests: max_ratio=0.30, max_gate=0.70, aggressive gate_push=3.0
#   Target effective amplitude: 0.30 × 0.60 × hs_std = 0.18 × hs_std
#
# Risk: too strong guide might destabilize overlay (like v40b).
# Mitigation: freeze_fg_spatial_stage3=true locks overlay at stage2 exit.
#
# Compare with v40c (multiscale approach) to isolate:
#   v40c: more injection POINTS (4 vs 2 blocks) at normal strength
#   v40d: same 2 injection points but STRONGER signal
#
# Run on GPU 1.

objective: factorized_fg_id
schedule: S3
representation: factorized_fg_id
guide_family: four_stream
guide_max_ratio: 0.30               # 2× stronger than v40a (0.15)
depth_bins: 8
hidden_dim: 64
spatial_h: 16
spatial_w: 16
n_classes: 3
inject_config: mid_up2
update_schedule: hybrid
freeze_vol_stage3: true
freeze_fg_spatial_stage3: true
stage1_epochs_override: 100
vol_stage2_lr_factor: 0.01

scene_type: col
gate_warm_start: 0.15              # warm-start higher (was 0.1)

training:
  epochs: 220
  steps_per_epoch: 20
  eval_every: 5
  lr_volume: 5e-4
  lr_guide: 6e-4
  lr_lora: 5e-5
  lr_adapter: 5e-5
  la_diff: 1.0
  la_vol: 3.0
  lambda_id: 10.0
  fg_pos_weight: 10.0
  lambda_vis: 0.5
  t_max: 300
  n_frames: 8
  height: 256
  width: 256
  seed: 7
  la_feature_sep: 1.0
  scene_type: col
  temp_start: 1.0
  temp_end: 0.3
  diff_warmup_epochs: 5
  lambda_compact: 3.0
  lambda_depth_ce: 3.0
  lambda_depth_vis: 2.0
  compact_warmup_epoch: 0
  balance_warmup_epoch: 100
  lambda_gate_push: 3.0             # aggressive push (was 0.5)
  min_gate_stage3: 0.20             # force gate ≥ 0.20 in stage3 (was 0.10)
  max_gate: 0.70                    # allow much wider gates
  lambda_balance: 3.0
  lambda_iso: 1.0

  lambda_spatial_coherence: 0.3
  lambda_fg_prior: 1.0
  min_fg_fraction: 0.05
  lambda_perm_consist: 0.2
  lambda_amodal_coverage: 0.5
  min_amodal_coverage: 0.02

eval:
  n_steps: 20
  guidance_scale: 7.5
  eval_seed: 42

data:
  data_root: toy/data_objaverse
  val_frac: 0.2
  volume_gt_render_resolution: 128

model:
  adapter_rank: 64
  lora_rank: 4
  pipeline: emilianJR/epiCRealism
  motion_adapter: guoyww/animatediff-motion-adapter-v1-5-3

lambda_overlay_preserve_s3: 5.0
