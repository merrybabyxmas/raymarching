# B1 v40h: spatial_h=32 + entity-masked feature separation (2026-04-16)
#
# HYPOTHESIS: cosF=0.478 stuck in v40e/f because background tokens (900/1024)
# dilute the feature separation gradient at spatial_h=32 (1024 tokens).
#
# FIX: use_entity_sep_mask=true — applies loss_feature_separation weighted by
# GT entity union mask (resized to 32×32 = 1024 tokens).
#   - Entity pixels (mask≈1): full gradient
#   - Background (mask≈0): near-zero contribution
#   - Expected: cosF drops to near 0 (like v40c cosF=0.000 at 16×16)
#
# Compare with v40g (la_feature_sep=5.0 unmasked) to isolate:
#   v40g: brute-force 5× amplification, still diluted by background
#   v40h: entity-focused with la_feature_sep=1.0 but masked
#
# Run on GPU 1.

objective: factorized_fg_id
schedule: S3
representation: factorized_fg_id
guide_family: four_stream
guide_max_ratio: 0.20
feat_dim: 320
backbone_primary_idx: 2
depth_bins: 8
hidden_dim: 64
spatial_h: 32
spatial_w: 32
n_classes: 3
inject_config: multiscale
update_schedule: hybrid
freeze_vol_stage3: true
freeze_fg_spatial_stage3: true
freeze_guide_stage3: true
stage1_epochs_override: 100
vol_stage2_lr_factor: 0.01

scene_type: col
gate_warm_start: 0.10

training:
  epochs: 220
  steps_per_epoch: 20
  eval_every: 5
  lr_volume: 5e-4
  lr_guide: 6e-4
  lr_lora: 5e-5
  lr_adapter: 5e-5
  la_diff: 2.0
  la_vol: 3.0
  lambda_id: 10.0
  fg_pos_weight: 10.0
  lambda_vis: 0.5
  t_max: 300
  n_frames: 8
  height: 256
  width: 256
  seed: 7
  la_feature_sep: 3.0                  # moderate strength (masked = more focused)
  use_entity_sep_mask: true            # KEY: focus gradient on entity pixels only
  scene_type: col
  temp_start: 1.0
  temp_end: 0.3
  diff_warmup_epochs: 5
  lambda_compact: 3.0
  lambda_depth_ce: 3.0
  lambda_depth_vis: 2.0
  compact_warmup_epoch: 0
  balance_warmup_epoch: 100
  lambda_gate_push: 1.5
  min_gate_stage3: 0.10
  max_gate: 0.45
  lambda_balance: 3.0
  lambda_iso: 1.0

  lambda_spatial_coherence: 0.3
  lambda_fg_prior: 1.0
  min_fg_fraction: 0.05
  lambda_perm_consist: 0.2
  lambda_amodal_coverage: 0.5
  min_amodal_coverage: 0.02

eval:
  n_steps: 20
  guidance_scale: 7.5
  eval_seed: 42

data:
  data_root: toy/data_objaverse
  val_frac: 0.2
  volume_gt_render_resolution: 128

model:
  adapter_rank: 64
  lora_rank: 4
  pipeline: emilianJR/epiCRealism
  motion_adapter: guoyww/animatediff-motion-adapter-v1-5-3

lambda_overlay_preserve_s3: 5.0
