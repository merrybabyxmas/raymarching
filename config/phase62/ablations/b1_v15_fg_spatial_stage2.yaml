# B1 v15: factorized_fg_id + S3 + dual guide
# Key fixes over v14:
# 1. projection.py threshold 0.5→0.3 (reduces fg_magnitude requirement: 0.81→0.46)
# 2. fg_spatial_head split into own param group, unfrozen in stage2 (lr=0.3×lr_vol)
#    Allows fg_magnitude to co-adapt as backbone improves through adapter training.
#    Deep volume (depth_attn) stays frozen → compact protected.
# 3. stage3 vol lr multiplier 0.25→0.05 (prevents depth_attn destabilisation)
objective: factorized_fg_id
schedule: S3
representation: factorized_fg_id
guide_family: dual

depth_bins: 8
hidden_dim: 64
spatial_h: 16
spatial_w: 16
n_classes: 3
inject_config: mid_up2
update_schedule: hybrid

training:
  epochs: 60
  steps_per_epoch: 20
  eval_every: 5
  lr_volume: 5e-4
  lr_guide: 3e-4
  lr_lora: 5e-5
  lr_adapter: 1e-4
  la_diff: 1.0
  la_vol: 3.0
  lambda_id: 3.0
  fg_pos_weight: 10.0
  lambda_vis: 0.2
  t_max: 300
  n_frames: 8
  height: 256
  width: 256
  seed: 7
  la_feature_sep: 0.0
  temp_start: 1.0
  temp_end: 0.3
  diff_warmup_epochs: 5
  lambda_compact: 1.0
  lambda_depth_ce: 3.0
  lambda_depth_vis: 2.0
  compact_warmup_epoch: 0

eval:
  n_steps: 20
  guidance_scale: 7.5
  eval_seed: 42

data:
  data_root: toy/data_objaverse
  val_frac: 0.2
  volume_gt_render_resolution: 128

model:
  adapter_rank: 64
  lora_rank: 4
  pipeline: emilianJR/epiCRealism
  motion_adapter: guoyww/animatediff-motion-adapter-v1-5-3
