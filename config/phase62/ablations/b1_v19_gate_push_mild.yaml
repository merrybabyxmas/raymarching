# B1 v19: gate push mild (lambda_gate_push 0.1→0.03) + freeze_vol_stage3
#
# v18 diagnosis (2026-04-14):
#   lambda_gate_push=0.1 caused gate to reach 0.34 by ep49 (stage2).
#   iou_min completely plateaued at 0.067 from ep44→ep49 (never reached 0.10).
#   Root cause: over-large gate drives adapter optimization toward guide-dependent
#   features → fg_spatial_head input features become less informative for volume
#   prediction → iou_min growth blocked.
#
# Fix: reduce lambda_gate_push to 0.03 (~3× slower gate growth).
#   Expected gate trajectory: ep24≈0.02, ep39≈0.05-0.06, ep59≈0.08-0.10.
#   Gate still exceeds S3 threshold (0.05) by ep39-44, but does not overwhelm
#   the adapter optimization budget.
#
# All other v18 fixes retained:
#   - freeze_vol_stage3=true (protects iou_min from stage3 joint training collapse)
#   - depth_prior_scale=10.0
#   - projection threshold=0.3
#   - fg_spatial own param group, unfrozen stage2 (lr×0.3)
#   - combined vol+fg_spatial clip max_norm=0.3
#   - epochs=80, lr_guide=6e-4
objective: factorized_fg_id
schedule: S3
representation: factorized_fg_id
guide_family: dual

depth_bins: 8
hidden_dim: 64
spatial_h: 16
spatial_w: 16
n_classes: 3
inject_config: mid_up2
update_schedule: hybrid
freeze_vol_stage3: true

training:
  epochs: 80
  steps_per_epoch: 20
  eval_every: 5
  lr_volume: 5e-4
  lr_guide: 6e-4
  lr_lora: 5e-5
  lr_adapter: 1e-4
  la_diff: 1.0
  la_vol: 3.0
  lambda_id: 3.0
  fg_pos_weight: 10.0
  lambda_vis: 0.2
  t_max: 300
  n_frames: 8
  height: 256
  width: 256
  seed: 7
  la_feature_sep: 0.0
  temp_start: 1.0
  temp_end: 0.3
  diff_warmup_epochs: 5
  lambda_compact: 1.0
  lambda_depth_ce: 3.0
  lambda_depth_vis: 2.0
  compact_warmup_epoch: 0
  lambda_gate_push: 0.03

eval:
  n_steps: 20
  guidance_scale: 7.5
  eval_seed: 42

data:
  data_root: toy/data_objaverse
  val_frac: 0.2
  volume_gt_render_resolution: 128

model:
  adapter_rank: 64
  lora_rank: 4
  pipeline: emilianJR/epiCRealism
  motion_adapter: guoyww/animatediff-motion-adapter-v1-5-3
