# B1 v40s seed=7: balance pre-freeze anneal (2026-04-15)
#
# ROOT CAUSE: seed=7 stage2 winner oscillates 0.50-0.73 (period ~20 epochs).
# freeze_vol_stage3=true locks entity_probs at whatever winner is at ep195.
# If freeze catches high phase (winner=0.72), balance is locked → stage3 FAIL.
#
# FIX: In final balance_anneal_epochs of stage2, ramp lambda_balance 3.0→15.0.
# This strong push forces winner toward 0.50 just before vol freeze at ep195.
# Even if seed=7 is in a high-winner phase at ep180, by ep195 it will be ~0.50.
#
# balance_anneal_epochs=15: ramp over ep180-ep195 (last 15 stage2 epochs)
# balance_anneal_strength=5.0: lambda_balance reaches 3.0*5.0=15.0 at ep195
#
# GPU: 0, Seed: 7

objective: factorized_fg_id
schedule: S3
representation: factorized_fg_id
guide_family: dual
depth_bins: 8
hidden_dim: 64
spatial_h: 32
spatial_w: 32
feat_dim: 320
backbone_primary_idx: 2
n_classes: 3
inject_config: multiscale
update_schedule: hybrid
freeze_vol_stage3: true
freeze_fg_spatial_stage3: true
freeze_guide_stage3: false
stage1_epochs_override: 100
vol_stage2_lr_factor: 0.01
adapter_lr_scale_stage3: 0.1

scene_type: col
gate_warm_start: 0.10

training:
  epochs: 260
  steps_per_epoch: 20
  eval_every: 5
  lr_volume: 5e-4
  lr_guide: 6e-4
  lr_lora: 5e-5
  lr_adapter: 5e-5
  la_diff: 2.5
  la_vol: 3.0
  lambda_id: 10.0
  fg_pos_weight: 10.0
  lambda_vis: 0.5
  t_max: 300
  n_frames: 8
  height: 256
  width: 256
  seed: 7
  la_feature_sep: 3.0
  use_entity_sep_mask: true
  scene_type: col
  temp_start: 1.0
  temp_end: 0.3
  diff_warmup_epochs: 5
  lambda_compact: 5.0
  lambda_depth_ce: 3.0
  lambda_depth_vis: 2.0
  compact_warmup_epoch: 0
  balance_warmup_epoch: 0
  lambda_gate_push: 1.5
  min_gate_stage3: 0.10
  max_gate: 0.45
  lambda_balance: 3.0
  lambda_iso: 1.0
  balance_anneal_epochs: 15          # ramp over last 15 stage2 epochs (ep180-ep195)
  balance_anneal_strength: 5.0       # lambda_balance reaches 15.0 at stage3 entry

  lambda_spatial_coherence: 0.3
  lambda_fg_prior: 1.0
  min_fg_fraction: 0.05
  lambda_perm_consist: 0.2
  lambda_amodal_coverage: 0.5
  min_amodal_coverage: 0.02

eval:
  n_steps: 20
  guidance_scale: 7.5
  eval_seed: 42

data:
  data_root: toy/data_objaverse
  val_frac: 0.2
  volume_gt_render_resolution: 128

model:
  adapter_rank: 64
  lora_rank: 4
  pipeline: emilianJR/epiCRealism
  motion_adapter: guoyww/animatediff-motion-adapter-v1-5-3

lambda_overlay_preserve_s3: 5.0
