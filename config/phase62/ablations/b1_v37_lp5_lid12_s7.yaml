  lr_adapter: 5e-5
  la_diff: 1.0
  la_vol: 3.0
  lambda_id: 12.0             # v37: tighter entity balance (was 10.0), prevent winner>0.55
  fg_pos_weight: 10.0
  lambda_vis: 0.5
  t_max: 300
  n_frames: 8
  height: 256
  width: 256
  seed: 7
  la_feature_sep: 0.0
  temp_start: 1.0
  temp_end: 0.3
  diff_warmup_epochs: 5
  lambda_compact: 3.0
  lambda_depth_ce: 3.0
  lambda_depth_vis: 2.0
  compact_warmup_epoch: 0
  balance_warmup_epoch: 100
  lambda_gate_push: 0.0
  min_gate_stage3: 0.10
  max_gate: 0.35
  lambda_balance: 3.0

eval:
  n_steps: 20
  guidance_scale: 7.5
  eval_seed: 42

