# B1 v40q seed=7: freeze_vol_stage3=false to preserve lambda_balance gradient path (2026-04-15)
#
# ROOT CAUSE of seed=7 failure (confirmed across v40m/n/o/p):
#   freeze_vol_stage3=true blocks entity_probs gradient path in stage3.
#   lambda_balance acts via: loss_balance(vis_e0, vis_e1) → vis_e0 → entity_probs
#   When entity_probs is frozen, lambda_balance gradient = 0 → can't correct imbalance.
#   winner jumps 0.50→0.73+ at stage3 entry and never recovers.
#
# v39h (spatial_h=16, NO freeze_vol_stage3) PASSED C_robust for seed=7 at ep209.
# Hypothesis: spatial_h=32 + unfreeze vol in stage3 = same result.
#
# Risk: unfrozen vol in stage3 may cause LCC instability (was fixed by freeze in v40m).
# Mitigation: lambda_spatial_coherence=0.3 + freeze_fg_spatial_stage3=true still active.
# Also reduce lr_volume slightly (3e-4 instead of 5e-4) to prevent rapid oscillation.
#
# GPU: 0, Seed: 7

objective: factorized_fg_id
schedule: S3
representation: factorized_fg_id
guide_family: dual
depth_bins: 8
hidden_dim: 64
spatial_h: 32
spatial_w: 32
feat_dim: 320
backbone_primary_idx: 2
n_classes: 3
inject_config: multiscale
update_schedule: hybrid
freeze_vol_stage3: false          # KEY: allow entity_probs to respond to lambda_balance
freeze_fg_spatial_stage3: true    # Keep fg_spatial frozen to prevent overlay drop
freeze_guide_stage3: false
stage1_epochs_override: 100
vol_stage2_lr_factor: 0.01
adapter_lr_scale_stage3: 0.1

scene_type: col
gate_warm_start: 0.10

training:
  epochs: 260
  steps_per_epoch: 20
  eval_every: 5
  lr_volume: 3e-4                 # Slightly reduced to prevent vol oscillation in stage3
  lr_guide: 6e-4
  lr_lora: 5e-5
  lr_adapter: 5e-5
  la_diff: 2.5
  la_vol: 3.0
  lambda_id: 10.0
  fg_pos_weight: 10.0
  lambda_vis: 0.5
  t_max: 300
  n_frames: 8
  height: 256
  width: 256
  seed: 7
  la_feature_sep: 3.0
  use_entity_sep_mask: true
  scene_type: col
  temp_start: 1.0
  temp_end: 0.3
  diff_warmup_epochs: 5
  lambda_compact: 5.0
  lambda_depth_ce: 3.0
  lambda_depth_vis: 2.0
  compact_warmup_epoch: 0
  balance_warmup_epoch: 0
  lambda_gate_push: 1.5
  min_gate_stage3: 0.10
  max_gate: 0.45
  lambda_balance: 3.0
  lambda_iso: 1.0

  lambda_spatial_coherence: 0.3
  lambda_fg_prior: 1.0
  min_fg_fraction: 0.05
  lambda_perm_consist: 0.2
  lambda_amodal_coverage: 0.5
  min_amodal_coverage: 0.02

eval:
  n_steps: 20
  guidance_scale: 7.5
  eval_seed: 42

data:
  data_root: toy/data_objaverse
  val_frac: 0.2
  volume_gt_render_resolution: 128

model:
  adapter_rank: 64
  lora_rank: 4
  pipeline: emilianJR/epiCRealism
  motion_adapter: guoyww/animatediff-motion-adapter-v1-5-3

lambda_overlay_preserve_s3: 5.0
