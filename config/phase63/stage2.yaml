# Phase 63 — Stage 2: Guide Encoder Pretrain
# EntityField frozen (load from stage1 best.pt)
# StructuredGuideEncoder trained with diffusion MSE loss
# GPU: CUDA_VISIBLE_DEVICES=3

run_name: p63_stage2

# ── Model (same as Stage 1) ─────────────────────────────────────────────────
depth_bins: 8
hidden_dim: 64
app_dim: 32
spatial_h: 32
spatial_w: 32
feat_dim: 320
inject_config: multiscale
guide_max_ratio: 0.1
gate_warm_start: 0.0

# ── Training ────────────────────────────────────────────────────────────────
training:
  epochs: 30
  steps_per_epoch: 30
  eval_every: 5
  lr_guide: 1.0e-4    # guide encoder LR
  lr_field: 0.0       # field frozen in stage2
  lr_adapter: 0.0     # backbone adapters frozen
  lr_lora: 1.0e-5     # small UNet LoRA update for diffusion

  # Loss weights (Stage 2: diffusion + optional contrast)
  lambda_diff:     1.0   # MSE(noise_pred, noise)
  lambda_contrast: 0.5   # margin: no-guide loss > guided loss (encourages guide utility)
  contrast_margin: 0.02  # target margin for contrast loss

  grad_clip: 1.0
  t_max: 500         # Stage 2: full noise range for diffusion training
  n_frames: 1
  height: 256
  width: 256
  seed: 42
  collision_prob: 0.5

# ── Stage 1 checkpoint ───────────────────────────────────────────────────────
stage1_ckpt: checkpoints/phase63/p63_stage1/best.pt

# ── Eval ────────────────────────────────────────────────────────────────────
eval:
  n_steps: 20
  guidance_scale: 7.5
  eval_seed: 42
  visible_survival_thresh: 0.02
  min_survival: 0.03

# ── Data ────────────────────────────────────────────────────────────────────
data:
  data_root: toy/data_objaverse
  val_frac: 0.2
  volume_gt_render_resolution: 128

# ── Backbone ─────────────────────────────────────────────────────────────────
model:
  adapter_rank: 64
  lora_rank: 4
  pipeline: emilianJR/epiCRealism
  motion_adapter: guoyww/animatediff-motion-adapter-v1-5-3
  feat_dim: 640
